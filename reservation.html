<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>My Reservations</title>

<link rel="stylesheet" href="assets/css/reservation.css">
  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>

</head>

<body>

  <div class="page">

    <div class="reservation-panel">

      <!-- TITLE -->
      <h1 class="title">
        My Reservations
      </h1>

      <!-- ========================= -->
      <!-- ACTIVE RESERVATIONS -->
      <!-- ========================= -->

      <div class="section">

        <div class="section-header">

          <div class="section-icon">
            <i class="fa-solid fa-mug-hot"></i>
          </div>

          <div>
            <h2>Active Reservations</h2>
            <p>
              Your upcoming cafe bookings
            </p>
          </div>

        </div>

        <!-- REALTIME ACTIVE CARDS -->
        <div id="activeReservations"></div>

      </div>


      <!-- ========================= -->
      <!-- COMPLETED RESERVATIONS -->
      <!-- ========================= -->

      <div class="section">

        <div class="section-header">

          <div class="section-icon">
            <i class="fa-regular fa-clock"></i>
          </div>

          <div>
            <h2>Completed Reservations</h2>
            <p>
              Your past cafe experiences
            </p>
          </div>

        </div>

        <!-- REALTIME PAST CARDS -->
        <div id="pastReservations"></div>

      </div>

    </div>

  </div>


  <!-- TOAST -->
  <div id="toast"></div>


  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


  <!-- RESERVATION JS -->
  <script type="module"
          src="assets/js/reservation.js"></script>

</body>
</html>
