<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Reservations</title>

  <link rel="stylesheet" href="assets/css/reservation.css">
  <link rel="stylesheet" href="./assets/css/navbar.css">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
</head>

<body>

<!-- ================= NAVBAR (保留完整) ================= -->
<div class="navbar">
  <div class="logo-area">
    <i class="fas fa-mug-hot logo-icon"></i>
    <span class="logo-text">CafeHunt</span>
  </div>
  <div class="nav-links">
    <!-- navbar.js 会自动填 -->
  </div>
</div>

<div class="page">

  <div class="reservation-panel">

    <h1 class="title">My Reservations</h1>

    <!-- ================= PENDING ================= -->
    <div class="section">
      <div class="section-header">
        <div class="section-icon">
          <i class="fa-solid fa-hourglass-start"></i>
        </div>
        <div>
          <h2 class="title-pending">Pending</h2>
          <p>Waiting for confirmation</p>
        </div>
      </div>
      <div id="pendingList"></div>
    </div>

    <!-- ================= ACCEPTED ================= -->
    <div class="section">
      <div class="section-header">
        <div class="section-icon">
          <i class="fa-solid fa-check"></i>
        </div>
        <div>
          <h2 class="title-accept">Accepted</h2>
          <p>Your booking is confirmed</p>
        </div>
      </div>
      <div id="acceptList"></div>
    </div>

    <!-- ================= REJECTED ================= -->
    <div class="section">
      <div class="section-header">
        <div class="section-icon">
          <i class="fa-solid fa-xmark"></i>
        </div>
        <div>
          <h2 class="title-reject">Rejected</h2>
          <p>Booking not approved</p>
        </div>
      </div>
      <div id="rejectList"></div>
    </div>

    <!-- ================= COMPLETED ================= -->
    <div class="section">
      <div class="section-header">
        <div class="section-icon">
          <i class="fa-solid fa-flag-checkered"></i>
        </div>
        <div>
          <h2 class="title-completed">Completed</h2>
          <p>Finished visits</p>
        </div>
      </div>
      <div id="completedList"></div>
    </div>

    <!-- ================= EXPIRED ================= -->
    <div class="section">
      <div class="section-header">
        <div class="section-icon">
          <i class="fa-regular fa-clock"></i>
        </div>
        <div>
          <h2 class="title-expired">Expired</h2>
          <p>Missed reservations</p>
        </div>
      </div>
      <div id="expiredList"></div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- YOUR JS -->
<script type="module" src="assets/js/reservation.js"></script>

</body>
</html>
