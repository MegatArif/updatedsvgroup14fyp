<!DOCTYPE html>
<html>
<head>
  <title>Social Page</title>
  <link rel="stylesheet" href="./assets/css/social.css">
</head>

<body>

<div class="navbar">
    <div class="logo-area">
        <i class="fas fa-mug-hot logo-icon"></i>
        <span class="logo-text">CafeHunt</span>
    </div>
    <div class="nav-links">
        <a href="#"><i class="fas fa-compass"></i> Explore</a>
        <a href="#" class="post"><i class="fas fa-plus-circle"></i> Post</a>
        <a href="#" style="position:relative">
            <i class="fas fa-bell"></i> Notifications
            
        </a>
        <a href="#"><i class="fas fa-user"></i> Profile</a>
    </div>
</div>

<div class="page">

  <div class="sidebar">

  <h3 id="my-post-title">My Posts ()</h3>

  <div id="my-posts"></div>

  <div class="create-post-bar">

    <!-- 🔥 FIX：加 id -->
    <img id="sidebar-avatar"
         src="picture/user2avatar.jpeg"
         class="bottom-avatar">

    <input type="text" id="post-input" placeholder="Share your cafe experience...">

    <label for="upload-img">📷</label>

    <input type="file" id="upload-img" hidden>

    <img id="preview-img"
         style="width:60px;height:60px;border-radius:10px;object-fit:cover;display:none;" />

    <img src="picture/locateicon.png"
         onclick="addLocation()"
         class="action-icon">

    <button onclick="createPost()">Create</button>

  </div>

</div>


  <div class="feed" id="feed"></div>

</div>

<script type="module" src="./assets/js/social.js"></script>

</body>
</html>
