<!DOCTYPE html>
<html>
<head>
  <title>Social Page</title>
  <link rel="stylesheet" href="./assets/css/social.css">
</head>

<body>

<div class="topbar">
  <div class="logo">☕ CafeHunt</div>
</div>

<div class="page">

  <div class="sidebar">

    <h3>My Posts (ANNIE)</h3>
    <div id="my-posts"></div>

  
    <div class="create-post-bar">

      <img src="picture/user2avatar.jpeg" class="bottom-avatar">

      <input type="text" id="post-input" placeholder="Share your cafe experience...">

      <label for="upload-img">
        📷
      </label>

      <input type="file" id="upload-img" hidden>
      <img id="preview-img" style="width:60px;height:60px;border-radius:10px;object-fit:cover;display:none;" />

      <img src="picture/locateicon.png" onclick="addLocation()" class="action-icon">

      <button onclick="createPost()">Create</button>

    </div>

  </div>


  <div class="feed" id="feed"></div>

</div>

<script type="module" src="./assets/js/social.js"></script>

</body>
</html>
