<!DOCTYPE html>
<html>
<head>
  <title>CafeHunt Admin Panel</title>
  <link rel="stylesheet" href="./assets/css/adminpost.css">
  <link rel="stylesheet" href="./assets/css/navbar.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
</head>

<body>

<!-- TOP BAR -->
<div class="navbar">
  <div class="logo-area">
    <i class="fas fa-mug-hot logo-icon"></i>
    <span class="logo-text">CafeHunt</span>
  </div>
  <div class="nav-links">
    <!-- Populated by navbar.js -->
  </div>
</div>

<div class="container">

  <!-- SIDEBAR STATS -->
  <div class="sidebar">

    <h2>Dashboard</h2>

    <div class="stat-box">
      <h3>Total Posts</h3>
      <p id="total-posts">0</p>
    </div>

    <div class="stat-box">
      <h3>System</h3>
      <p>ACTIVE</p>
    </div>

  </div>

  <!-- MAIN FEED -->
  <div class="main">

    <h2>All User Posts</h2>

    <div id="admin-feed"></div>

  </div>

</div>

<script type="module" src="./assets/js/adminpost.js"></script>

</body>
</html>
