<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link rel="stylesheet" href="assets/css/navbar.css">
<link rel="stylesheet" href="assets/css/sonotification.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="navbar">
  <div class="logo-area">
    <i class="fas fa-mug-hot logo-icon"></i>
    <span class="logo-text">CafeHunt</span>
  </div>

  <div class="nav-links">
    
  </div>
</div>

<div class="notification-page">

  <div class="notif-header-row">
    <div>
      <h1>Notifications</h1>
      <p class="notif-sub">Stay updated on your cafe reservations</p>
    </div>

    <button class="mark-all-btn" id="markAllBtn" type="button">
      <i class="fas fa-check-double"></i>
      Mark all as read
    </button>
  </div>

  <div id="mainView">

    <div id="categoryContainer"></div>
  </div>

  <div id="detailView" style="display:none;">

    <button id="backBtn">
      <i class="fas fa-arrow-left"></i>
      Back
    </button>

    <h1 id="detailTitle"></h1>

    <div id="detailList"></div>

  </div>

</div>

<script type="module" src="assets/js/sonotification.js"></script>

</body>
</html>
