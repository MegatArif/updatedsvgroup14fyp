<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Table Reservation</title>
    <link rel="stylesheet" href="assets/css/bookingform.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <script type="module" src="assets/js/bookingform.js" defer></script>
  </head>
  <body>

    <div class="card" id="formCard">
      <div class="card-header">
        <h1>Table Reservation</h1>
        <p id="cafeSubtitle">Experience exquisite dining at Pronto</p>
      </div>

      <form id="reservationForm" novalidate>
        <div class="form-group">
          <label for="guests">Number of Guests</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 1.34 5 3s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <select id="guests" class="form-control" required>
              <option value="" disabled selected>Select number of people</option>
              <option value="1 Person">1 Person</option>
              <option value="2 People">2 People</option>
              <option value="3 People">3 People</option>
              <option value="4 People">4 People</option>
              <option value="5 People">5 People</option>
              <option value="6+ People">6+ People</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="resDate">Reservation Date</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            <input type="date" id="resDate" class="form-control" required>
          </div>
        </div>

        <div class="form-group">
          <label for="resTime">Reservation Time</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
            <input type="time" id="resTime" class="form-control" required>
          </div>
        </div>

        <button type="submit" class="btn-submit">Book Table</button>
      </form>
    </div>

    <div class="card hidden" id="confirmationCard">
      <div class="success-icon">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      </div>
      
      <div class="card-header">
        <h1>Reservation Confirmed!</h1>
        <p>We are delighted to host you.</p>
      </div>

      <div class="summary-details">
        <div class="summary-item">
          <span class="summary-label">Guests</span>
          <span class="summary-value" id="summaryGuests">-</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Date</span>
          <span class="summary-value" id="summaryDate">-</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Time</span>
          <span class="summary-value" id="summaryTime">-</span>
        </div>
      </div>

      <p class="notice">
        * Table will be held for a maximum of 15 minutes past your scheduled reservation time. Please contact us if you run late.
      </p>

      <button type="button" id="returnMenuBtn" class="btn-submit" style="margin-top: 20px;">Return to Main Menu</button>
    </div>

  </body>
</html>
